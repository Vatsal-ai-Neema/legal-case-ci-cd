name: CD Self Hosted

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    env:
      DEPLOY_PATH: D:\deployments\legal-case-ci-cd
      CONTAINER_NAME: legal-app-self-hosted
      HOST_PORT: 8001
      COMPOSE_DOCKER_CLI_BUILD: 0
      DOCKER_BUILDKIT: 0

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Prepare isolated deployment folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:DEPLOY_PATH" | Out-Null
          Copy-Item -Path "$env:GITHUB_WORKSPACE\repo\*" -Destination "$env:DEPLOY_PATH" -Recurse -Force

      - name: Stop old container if present
        shell: powershell
        run: |
          Set-Location "$env:DEPLOY_PATH"
          docker rm -f "$env:CONTAINER_NAME"
          docker compose down
          exit 0

      - name: Build and start latest container
        shell: powershell
        run: |
          Set-Location "$env:DEPLOY_PATH"
          docker compose up -d --build
